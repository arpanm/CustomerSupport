global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: dev
    project: supporthub

scrape_configs:

  # ============================================================
  # api-gateway — port 8080
  # ============================================================
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'api-gateway'

  # ============================================================
  # auth-service — port 8081
  # ============================================================
  - job_name: 'auth-service'
