spring:
  application:
    name: notification-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/supporthub}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "in.supporthub.shared.event,in.supporthub.shared.*"
        spring.json.use.type.headers: "false"
      # Topic list (documentation only — actual subscription via @KafkaListener annotations)
      topics:
        - ticket.created
        - ticket.status-changed
        - ticket.activity-added
        - tenant.onboarded

server:
  port: 8085

msg91:
  api-key: ${MSG91_API_KEY:}
  flow-id: ${MSG91_FLOW_ID:TICKET_CREATED}
  sender-id: ${MSG91_SENDER_ID:SUPTHB}

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:support@supporthub.in}

whatsapp:
  access-token: ${WHATSAPP_ACCESS_TOKEN:}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    in.supporthub.notification: INFO
    org.springframework.kafka: WARN
    org.springframework.data.mongodb: WARN
