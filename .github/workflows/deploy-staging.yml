name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name supporthub-staging --region ap-south-1
      - name: Run DB migrations
        run: |
          kubectl create job --from=cronjob/flyway-migrate flyway-migrate-$(date +%s) \
            -n supporthub-staging || true
          kubectl wait --for=condition=complete job/flyway-migrate-* \
            -n supporthub-staging --timeout=300s
      - name: Deploy services
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=supporthub/api-gateway:${{ github.sha }} \
            -n supporthub-staging
          # Similar for other services...
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n supporthub-staging --timeout=300s
      - name: Smoke test
        run: |
          sleep 30
          curl -f https://api.staging.supporthub.in/actuator/health || exit 1
