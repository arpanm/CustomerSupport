apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supporthub-ingress
  namespace: supporthub-staging
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.supporthub.in
      secretName: supporthub-staging-tls
  rules:
    - host: staging.supporthub.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
