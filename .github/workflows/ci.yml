name: SupportHub CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────
  # Backend: Unit Tests
  # ─────────────────────────────────────────
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run unit tests
        working-directory: backend
        run: ./mvnw test -Dsurefire.failIfNoSpecifiedTests=false
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: backend/**/target/surefire-reports/

  # ─────────────────────────────────────────
  # Backend: Integration Tests
  # ─────────────────────────────────────────
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Run integration tests (Testcontainers)
        working-directory: backend
        run: ./mvnw verify -Dfailsafe.failIfNoSpecifiedTests=false
        env:
          TESTCONTAINERS_REUSE_ENABLE: true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/**/target/site/jacoco/

  # ─────────────────────────────────────────
  # Backend: Security Scan (parallel)
  # ─────────────────────────────────────────
  backend-security-scan:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: OWASP Dependency Check
        working-directory: backend
        run: ./mvnw dependency-check:check -DfailBuildOnCVSS=8
        continue-on-error: true
      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: backend/**/target/dependency-check-report.html

  # ─────────────────────────────────────────
  # Backend: Code Analysis (parallel)
  # ─────────────────────────────────────────
  backend-code-analysis:
    name: Backend Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Run Checkstyle + SpotBugs + PMD
        working-directory: backend
        run: ./mvnw checkstyle:check spotbugs:check pmd:check -P analysis
        continue-on-error: true

  # ─────────────────────────────────────────
  # Frontend: Build + Test
  # ─────────────────────────────────────────
  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build workspace packages
        working-directory: frontend
        run: |
          npm run build -w packages/customer-sdk
          npm run build -w packages/ui-components
      - name: TypeScript check
        working-directory: frontend
        run: npm run typecheck --workspaces --if-present
      - name: Lint
        working-directory: frontend
        run: npm run lint --workspaces --if-present
      - name: Test
        working-directory: frontend
        run: npm run test --workspaces --if-present
      - name: Build
        working-directory: frontend
        run: npm run build --workspaces --if-present

  # ─────────────────────────────────────────
  # Build Docker Images (after all quality gates)
  # ─────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-integration-tests
      - backend-security-scan
      - backend-code-analysis
      - frontend-build-test
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        service: [api-gateway, auth-service, ticket-service, customer-service, ai-service, notification-service, faq-service, reporting-service, tenant-service, order-sync-service, mcp-server]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
        continue-on-error: true
      - name: Build image
        run: |
          docker build \
            -f infrastructure/docker/${{ matrix.service }}/Dockerfile \
            -t supporthub/${{ matrix.service }}:${{ github.sha }} \
            --build-arg SERVICE=${{ matrix.service }} \
            backend/
