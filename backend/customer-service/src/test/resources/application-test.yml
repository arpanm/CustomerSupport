spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    producer:
      retries: 0
    consumer:
      auto-offset-reset: earliest

# Point order-sync to a non-existent host; OrderHistoryService is mocked via @MockBean
order-sync:
  base-url: http://localhost:9999

logging:
  level:
    in.supporthub: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
