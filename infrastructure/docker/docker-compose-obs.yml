version: "3.9"

# SupportHub — Observability Stack
# Task: OBS-001
# Usage: docker compose -f infrastructure/docker/docker-compose-obs.yml up -d
# Access:
#   Grafana:    http://localhost:3010  (admin / supporthub_grafana)
#   Prometheus: http://localhost:9090
#   Loki:       http://localhost:3100
#   Langfuse:   http://localhost:3030

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  langfuse_db_data:

services:

  # ============================================================
  # Prometheus — metrics scraping and storage
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: supporthub-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # Grafana — dashboards and alerting
  # ============================================================
  grafana:
    image: grafana/grafana:10.3.0
    container_name: supporthub-grafana
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: supporthub_grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # Loki — log aggregation
  # ============================================================
  loki:
    image: grafana/loki:2.9.4
    container_name: supporthub-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # Promtail — log shipping agent
  # ============================================================
  promtail:
    image: grafana/promtail:2.9.4
    container_name: supporthub-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - observability

  # ============================================================
  # Langfuse — LLM observability (AI tracing for ai-service)
  # ============================================================
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: supporthub-langfuse
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: supporthub_langfuse_secret
      NEXTAUTH_URL: http://localhost:3030
      SALT: supporthub_salt
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # PostgreSQL for Langfuse (dedicated DB)
  # ============================================================
  langfuse-db:
    image: postgres:16-alpine
    container_name: supporthub-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
