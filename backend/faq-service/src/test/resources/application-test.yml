spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    producer:
      retries: 0
    consumer:
      auto-offset-reset: earliest
  ai:
    openai:
      # Real API calls are intercepted by @MockBean EmbeddingModel in tests
      api-key: test-mock-openai-key
      embedding:
        options:
          model: text-embedding-3-small

logging:
  level:
    in.supporthub: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
