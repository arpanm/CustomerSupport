spring:
  application:
    name: ai-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supporthub}
    username: ${DB_USER:supporthub}
    password: ${DB_PASS:supporthub}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/supporthub}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: ai-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "in.supporthub.shared.event,in.supporthub.shared.event.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_SENTIMENT_MODEL:claude-haiku-4-5-20251001}
  # Disable JPA/Flyway — ai-service uses MongoDB, not PostgreSQL directly for app data
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false

server:
  port: 8084

anthropic:
  sentiment-model: ${ANTHROPIC_SENTIMENT_MODEL:claude-haiku-4-5-20251001}
  resolution-model: ${ANTHROPIC_RESOLUTION_MODEL:claude-sonnet-4-5}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
