spring:
  application:
    name: mcp-server
  threads:
    virtual:
      enabled: true
  ai:
    mcp:
      server:
        name: supporthub-mcp
        version: 1.0.0

server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
